  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "coreutils": {
        "pkg-path": "coreutils"
      },
      "gcc": {
        "pkg-path": "gcc"
      },
      "gnumake": {
        "pkg-path": "gnumake"
      },
      "gnused": {
        "pkg-path": "gnused"
      },
      "gum": {
        "pkg-path": "gum"
      },
      "libyaml": {
        "pkg-path": "libyaml"
      },
      "pkg-config": {
        "pkg-path": "pkg-config"
      },
      "postgresql": {
        "pkg-path": "postgresql"
      },
      "ruby": {
        "pkg-path": "ruby"
      }
    },
    "vars": {
      "APP_NAME": "flox-rails-poc"
    },
    "hook": {
      "on-activate": "# Runtime-configurable variables (override with: VAR=value flox activate)\nexport DATABASE_HOST=\"${DATABASE_HOST:-localhost}\"\nexport DATABASE_PORT=\"${DATABASE_PORT:-5432}\"\nexport DATABASE_USER=\"${DATABASE_USER:-postgres}\"\nexport DATABASE_PASSWORD=\"${DATABASE_PASSWORD:-postgres}\"\nexport RAILS_ENV=\"${RAILS_ENV:-development}\"\n\n# Add gem bin directory to PATH (for rails, rake, etc.)\nRUBY_API_VERSION=\"$(ruby -e 'puts RbConfig::CONFIG[\"ruby_version\"]')\"\nexport GEM_HOME=\"${GEM_HOME:-$HOME/.local/share/gem/ruby/$RUBY_API_VERSION}\"\nexport PATH=\"$GEM_HOME/bin:$PATH\"\n\n# Ensure bundle install can find native libraries\n# (libyaml for psych, libpq for pg gem)\nsetup_bundle_config() {\n    # Use pkg-config to verify yaml-0.1 is findable; if not, locate it\n    if ! pkg-config --exists yaml-0.1 2>/dev/null; then\n        local libyaml_pc\n        libyaml_pc=\"$(find \"$FLOX_ENV/lib/pkgconfig\" /nix/store/*/lib/pkgconfig \\\n            -maxdepth 1 -name \"yaml-0.1.pc\" 2>/dev/null | head -1)\"\n        if [ -n \"$libyaml_pc\" ]; then\n            export PKG_CONFIG_PATH=\"$(dirname \"$libyaml_pc\"):${PKG_CONFIG_PATH:-}\"\n        fi\n    fi\n}\n\nsetup_bundle_config\n\n# Install gems if Gemfile exists and bundle isn't up to date\ninstall_gems() {\n    if [ -f \"$FLOX_ENV_PROJECT/Gemfile\" ]; then\n        if ! bundle check > /dev/null 2>&1; then\n            gum style --foreground 214 \"Installing gems...\"\n            bundle install --quiet || {\n                gum style --foreground 196 \"✗ Bundle install failed\"\n                return 1\n            }\n        fi\n    fi\n}\n\ninstall_gems\n\n# Display environment info\nshow_banner() {\n    gum style \\\n        --foreground 212 --border-foreground 212 --border double \\\n        --align center --width 56 --margin \"1 0\" --padding \"1 2\" \\\n        \"$APP_NAME\" \\\n        \"\" \\\n        \"Ruby $(ruby --version | cut -d' ' -f2)\" \\\n        \"Rails app · PostgreSQL in Docker\"\n\n    gum style --foreground 248 \\\n        \"  Database: $DATABASE_HOST:$DATABASE_PORT\" \\\n        \"  Scripts:  scripts/{dev,db-up,db-down,db-reset,test}\"\n}\n\nshow_banner\n\ncd \"$FLOX_ENV_PROJECT\"\n"
    },
    "profile": {
      "common": "# Aliases available in all shells\nalias be=\"bundle exec\"\nalias rs=\"bundle exec rails server -b 0.0.0.0\"\nalias rc=\"bundle exec rails console\"\nalias dbup=\"$FLOX_ENV_PROJECT/scripts/db-up\"\nalias dbdown=\"$FLOX_ENV_PROJECT/scripts/db-down\"\nalias dbreset=\"$FLOX_ENV_PROJECT/scripts/db-reset\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    }
  },
